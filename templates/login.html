<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My IoT Store</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .alert-top {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1050;
            width: 90%;
            max-width: 60vw;
        }
    </style>
</head>

<body id="loginBody">
    <!-- Bootstrap Alerts -->
    <div class="alert-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show alert-top" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
    <div class="login-card" style="width: 60%; height: 60%;">
        <h1 class="text-center">Smart Store</h5>
            <h2 class="text-center">Welcome</h3>
                <h5 class="text-center">The Future of Retail Starts Here
            </h2>
            <form method="POST" action="/login">
                <input type="text" name="Email" class="form-control" placeholder="Enter Email" required>
                <input type="password" name="Password" class="form-control" placeholder="Enter Password" required>
                <button type="submit" class="btn btn-info">Login</button>
            </form>
            <button type="button" class="btn btn-outline-light w-100 mt-3" data-bs-toggle="modal"
                data-bs-target="#createAccountModal">
                Create Account
            </button>
    </div>
    <!-- Create Account Modal -->
    <div class="modal fade" id="createAccountModal" tabindex="-1" aria-labelledby="createAccountModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title" id="createAccountModalLabel">Create Account</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <form method="POST" action="{{ url_for('create_account') }}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="dob" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" name="dob" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone_num" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" name="phone_num">
                        </div>
                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-info">Create Account</button>
                    </div>
                </form>

            </div>
        </div>
    </div>


    <script src="{{ url_for('static', filename='javascript.js') }}"></script>
    <!-- Bootstrap JS for alerts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
