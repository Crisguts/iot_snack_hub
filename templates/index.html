<!DOCTYPE html>
<html>
<head>
  <title>My IoT Store</title>
  <!-- <link rel="preload" href="{{ url_for('static', filename='styles.css') }}" as="style"> -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  
</head>
<body class="container-fluid bg-dark text-white" style="margin:0; padding:0;">

  <div class="row vh-100" style="margin: 0;">

    <!-- Sidebar -->
    <div class="col-3 d-flex flex-column justify-content-center p-4 bg-dark text-white">
      <div>
        <h1 class="mb-2 text-center">Smart Store</h1>
        <div id="date" class="fw-bold text-center"></div>
        <div id="clock" class="fw-bold text-center"></div>
      </div>

      <div class="d-flex flex-column align-items-center link-div" style="gap: 20px;">
        <a href="{{ url_for('index') }}" class="Sidebar fw-bold">Home</a>
        <a href="{{ url_for('client') }}" class="Sidebar fw-bold">Clients</a>
        <a href="" class="Sidebar fw-bold">To be Added</a>
      </div>

  <div class="d-flex flex-column align-items-center">
    <a id="logout" href="" class="Sidebar fw-bold">Logout</a> 
  </div>
    </div>

    <!-- Main content -->
    <div class="col-9 bg-secondary">
      <div class="w-100 p-4">

        <!-- Bootstrap Alerts -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- IKE THIS IS FOR YOU, MAKE THIS CUTE PLS, BUT KEEP ID NAME -->
        <!-- Fan Control Toggle -->
        <div class="d-flex justify-content-center align-items-center" style="height: 100%;">
          <label class="form-switch">
            <input type="checkbox" id="fanToggle">
            <i></i>
            <span class="ms-2">Fan Control</span>
          </label>
        </div>

        <style>
          .form-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
          }

          .form-switch input {
            opacity: 0;
            width: 0;
            height: 0;
          }

          .form-switch i {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
          }

          .form-switch i:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
          }

          .form-switch input:checked + i {
            background-color: #4caf50;
          }

          .form-switch input:checked + i:before {
            transform: translateX(26px);
          }
        </style>
      </div>
    </div>
  </div>



 <script>
// -----------------------------
// Clock & Date
// -----------------------------
function updateDateTime() {
    const now = new Date();

    // Date
    const day = now.getDate();
    const daySuffix = (d) => {
        if (d > 3 && d < 21) return 'th';
        switch (d % 10) {
            case 1: return "st";
            case 2: return "nd";
            case 3: return "rd";
            default: return "th";
        }
    };
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    const formattedDate = now.toLocaleDateString('en-US', options).replace(/\d+/, day + daySuffix(day));
    document.getElementById('date').textContent = formattedDate;

    // Time
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('clock').textContent = `${hours}:${minutes}`;
}
setInterval(updateDateTime, 1000);
updateDateTime();

// -----------------------------
// Alerts auto-hide
// -----------------------------
setTimeout(() => {
    document.querySelectorAll('.alert').forEach(alert => {
        alert.classList.add('hide-slide');
        alert.addEventListener('transitionend', () => alert.remove(), { once: true });
    });
}, 3000);

// -----------------------------
// Animate Customer Rows
// -----------------------------
document.querySelectorAll('.Customer').forEach((row, index) => {
    setTimeout(() => row.classList.add('visible'), index * 150);
});

// -----------------------------
// Delete Modal Setup
// -----------------------------
const deleteModal = document.getElementById('deleteModal');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

deleteModal.addEventListener('show.bs.modal', event => {
    const button = event.relatedTarget;
    const deleteUrl = button.getAttribute('data-delete-url');
    confirmDeleteBtn.setAttribute('href', deleteUrl);
});

// -----------------------------
// View & Edit Modals
// -----------------------------
const viewClientModal = document.getElementById('viewClientModal');
const editClientModal = document.getElementById('editClientModal');
const editClientForm = document.getElementById('editClientForm');
const editFromViewBtn = document.getElementById('editFromViewBtn');

viewClientModal.addEventListener('show.bs.modal', event => {
    const row = event.relatedTarget;
    const customerId = row.getAttribute('data-id');
    const firstName = row.getAttribute('data-firstname');
    const lastName = row.getAttribute('data-lastname');
    const email = row.getAttribute('data-email');
    const dateStr = row.getAttribute('data-date');

    // Fill View Modal
    document.getElementById('modalFirstName').textContent = firstName;
    document.getElementById('modalLastName').textContent = lastName;
    document.getElementById('modalEmail').textContent = email;
    document.getElementById('modalDate').textContent = dateStr
        ? new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : 'N/A';

    // Set hidden ID for Edit modal
    document.getElementById('editCustomerId').value = customerId;
});

// Fill Edit Modal when clicking "Edit Client" in View Modal
editFromViewBtn.addEventListener('click', () => {
    const customerId = document.getElementById('editCustomerId').value;

    // Set form action dynamically
    editClientForm.action = `/update/${customerId}`;

    // Fill form fields
    document.getElementById('editFirstName').value = document.getElementById('modalFirstName').textContent;
    document.getElementById('editLastName').value = document.getElementById('modalLastName').textContent;
    document.getElementById('editEmail').value = document.getElementById('modalEmail').textContent;
});

const editCancelBtn = document.getElementById('editBackButton');
const editModal = document.getElementById('editClientModal');
const viewModal = document.getElementById('viewClientModal');

editCancelBtn.addEventListener('click', () => {
  // Hide Edit modal
  const editModalInstance = bootstrap.Modal.getInstance(editModal);
  editModalInstance.hide();

  // Show View modal
  const viewModalInstance = new bootstrap.Modal(viewModal);
  viewModalInstance.show();
});

// -----------------------------
// Fan Toggle Control
// -----------------------------
document.getElementById("fanToggle").addEventListener("change", function () {
  const isChecked = this.checked; // true if the toggle is ON, false if OFF
  const action = isChecked ? "on" : "off";

  // Send a POST request to the backend (our app.py)
  fetch(`/fan/${action}`, { method: "POST" })
    .then(response => response.json())
    .then(data => console.log(data.message))
    .catch(error => console.error("Error:", error));
});
</script>


  <!-- Bootstrap JS for alerts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
