<!DOCTYPE html>
<html>
<head>
  <title>My IoT Store</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="container-fluid bg-dark text-white" style="margin:0; padding:0;">

  <div class="row vh-100" style="margin: 0;">
    <!-- Sidebar -->
    <div class="col-3 d-flex flex-column justify-content-center p-4 bg-dark text-white">
      <div>
        <h1 class="mb-2 text-center">Smart Store</h1>
        <div id="date" class="fw-bold text-center"></div>
        <div id="clock" class="fw-bold text-center"></div>
      </div>

      <div class="d-flex flex-column align-items-center link-div" style="gap: 20px;">
        <a href="{{ url_for('index') }}" class="Sidebar fw-bold">Home</a>
        <a href="{{ url_for('client') }}" class="Sidebar fw-bold">Clients</a>
        <a href="" class="Sidebar fw-bold">To be Added</a>
      </div>

      <div class="d-flex flex-column align-items-center mt-auto">
        <a id="logout" href="" class="Sidebar fw-bold">Logout</a> 
      </div>
    </div>

    <!-- Main content -->
    <div class="col-9 bg-secondary">

      <div class="w-100 p-4">
        <!-- Bootstrap Alerts -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
      </div>

      <!-- Title -->

        <!-- IKE THIS IS FOR YOU, MAKE THIS CUTE PLS, BUT KEEP ID NAME -->
        <!-- Fan Control Toggle -->
        <div class="d-flex justify-content-center align-items-center mt-3">
          <label class="form-switch d-flex align-items-center" style="gap: 10px; margin:0;">
            <input type="checkbox" id="fanToggle">
            <i></i>
            <span id="fan_cont_text" class="fw-bold text-white">Fan Control</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Humidity Gauge -->
    <div class="col-md-6 mb-3 d-flex">
      <div class="card bg-dark text-white p-4 shadow-lg border-0 rounded-4 flex-fill d-flex flex-column justify-content-between w-100">
        <h5 class="text-secondary mb-3">Current Humidity</h5>
        <canvas id="humidityGauge" height="100"></canvas>
        <h1 id="currentHumidity" class="fw-bold display-5 text-info mt-3">{{ current_humidity }}%</h1>
      </div>
    </div>
  </div>
</div>


        <!-- Bottom Row: Historical chart -->
        <div class="card bg-dark text-white p-3 shadow mt-4">
          <h5 class="text-center mb-3">Temperature & Humidity Over Time</h5>
          <canvas id="iotChart" height="250"></canvas>
        </div>
      </div>
    </div>

  

  <!-- Chart.js and Data -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script id="chart-data" type="application/json">
    {{ data | tojson | safe }}
  </script>

  <script id="current-data" type="application/json">
  {
    "temperature": {{ current_temp }},
    "humidity": {{ current_humidity }}
  }
  </script>

  <script>
    // -----------------------------
    // Clock & Date
    // -----------------------------
    function updateDateTime() {
      const now = new Date();
      const day = now.getDate();
      const daySuffix = (d) => {
        if (d > 3 && d < 21) return 'th';
        switch (d % 10) {
          case 1: return "st";
          case 2: return "nd";
          case 3: return "rd";
          default: return "th";
        }
      };
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const formattedDate = now.toLocaleDateString('en-US', options).replace(/\d+/, day + daySuffix(day));
      document.getElementById('date').textContent = formattedDate;

      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // -----------------------------
    // Alerts auto-hide
    // -----------------------------
    setTimeout(() => {
      document.querySelectorAll('.alert').forEach(alert => {
        alert.classList.add('hide-slide');
        alert.addEventListener('transitionend', () => alert.remove(), { once: true });
      });
    }, 3000);

    // -----------------------------
    // Read JSON Data
    // -----------------------------
    const chartData = JSON.parse(document.getElementById('chart-data').textContent);
    const currentData = JSON.parse(document.getElementById('current-data').textContent);

    const tempValue = currentData.temperature;
    const humidityValue = currentData.humidity;

    // -----------------------------
    // Top Gauges
    // -----------------------------
    const tempCtx = document.getElementById('tempGauge').getContext('2d');
    new Chart(tempCtx, {
      type: 'doughnut',
      data: {
        labels: ['Temp', 'Remaining'],
        datasets: [{
          data: [tempValue, 50 - tempValue],
          backgroundColor: ['rgba(255, 99, 132, 1)', 'rgba(255,255,255,0.1)'],
          borderWidth: 0,
          cutout: '80%',
          rotation: -90,
          circumference: 180
        }]
      },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
      }
    });

    const humCtx = document.getElementById('humidityGauge').getContext('2d');
    new Chart(humCtx, {
      type: 'doughnut',
      data: {
        labels: ['Humidity', 'Remaining'],
        datasets: [{
          data: [humidityValue, 100 - humidityValue],
          backgroundColor: ['rgba(54, 162, 235, 1)', 'rgba(255,255,255,0.1)'],
          borderWidth: 0,
          cutout: '80%',
          rotation: -90,
          circumference: 180
        }]
      },
      options: {
        responsive: false,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
      }
    });

    // -----------------------------
    // Bottom Historical Chart
    // -----------------------------
    const ctx = document.getElementById('iotChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.timestamps,
        datasets: [
          {
            label: 'Temperature (°C)',
            data: chartData.temperature,
            borderColor: 'rgba(255, 99, 132, 1)',
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            tension: 0.4,
            fill: true,
            yAxisID: 'y1'
          },
          {
            label: 'Humidity (%)',
            data: chartData.humidity,
            borderColor: 'rgba(54, 162, 235, 1)',
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            tension: 0.4,
            fill: true,
            yAxisID: 'y2'
          }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        stacked: false,
        scales: {
          y1: { type: 'linear', position: 'left', title: { display: true, text: 'Temperature (°C)' } },
          y2: { type: 'linear', position: 'right', title: { display: true, text: 'Humidity (%)' }, grid: { drawOnChartArea: false } },
          x: { title: { display: true, text: 'Time' } }
        },
        plugins: { legend: { labels: { color: '#fff' } } }
      }
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
