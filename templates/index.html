<!DOCTYPE html>
<html>
<head>
  <title>My IoT Store</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container mt-4">
  <h1 class="mb-4">🛒 My IoT Store</h1>

  <form method="POST" action="/add" class="d-flex mb-3">
    <input type="text" name="item" class="form-control me-2" placeholder="Add item">
    <button type="submit" class="btn btn-primary">Add</button>
  </form>

  <ul class="list-group">
    <!-- Loop through items and display them -->
    {% for i in items %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ i[1] }}
        <a href="/delete/{{ i[0] }}" class="btn btn-sm btn-danger">Delete</a>
      </li>
    {% endfor %}
  </ul>
</body>
</html>
